syntax = "proto3";

package app_server;

import "common.proto";

service MessageService {
  rpc UpdateLabels(UpdateLabelsRequest) returns (UpdateLabelsResponse);
}

message UpdateLabelsRequest {
  int64 messageId = 1;
  repeated string systemLabels = 2;
}

message UpdateLabelsResponse {
  bool success = 1;
  string message = 2;
}

