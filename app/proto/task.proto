syntax = "proto3";

package app_server;

import "common.proto";

message CreateTaskRequest {
  string name = 1;
  string description = 2;
  string due = 3;
  string priority = 4;
  repeated string assigners = 5;
  repeated int32 assigneeIds = 6;
  int32 messageId = 7;
}

service TaskService {
  rpc Create(CreateTaskRequest) returns (app_server.SuccessResponse);
}

