syntax = "proto3";

package app_server;

import "common.proto";

message CreateTaskRequest {
  int32 messageId = 1;
  string status = 2;
  repeated string assigners = 3;
  string name = 4;
  string description = 5;
  string due = 6;
  string priority = 7;
  repeated int32 assigneeIds = 8;
}

service TaskService {
  rpc Create(CreateTaskRequest) returns (app_server.SuccessResponse);
}

