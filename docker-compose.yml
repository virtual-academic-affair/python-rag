services:
  # RabbitMQ Message Broker (for email classification)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ai-service-rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ai-service-network

  # MinIO Object Storage (for RAG documents)
  minio:
    image: minio/minio:latest
    container_name: ai-service-minio
    ports:
      - "9000:9000"    # API port
      - "9001:9001"    # Console UI port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Enable browser access from outside
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
      MINIO_SERVER_URL: http://localhost:9000
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-service-network

  # MinIO Client for initialization
  minio-init:
    image: minio/mc:latest
    container_name: ai-service-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set minio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing minio/rag-files;
      /usr/bin/mc anonymous set public minio/rag-files;
      echo 'MinIO bucket created with public access: rag-files';
      echo 'Files accessible at: http://localhost:9000/rag-files/<path>';
      "
    networks:
      - ai-service-network

volumes:
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

networks:
  ai-service-network:
    driver: bridge
